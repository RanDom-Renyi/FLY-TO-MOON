<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLY TO MOON</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --cell-size: clamp(42px, 10.8vw, 58px);
      --cell-gap: 5px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 34%),
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.20), transparent 30%),
        linear-gradient(180deg, #0f172a 0%, #111827 48%, #020617 100%);
      color: #e5e7eb;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 12px;
      padding-bottom: 96px;
    }

    .header, .card-box, .players-box, .config-box, .log-box, .event-box, .board-wrap {
      background: rgba(15, 23, 42, 0.74);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.30);
    }

    .header { padding: 14px; margin-bottom: 10px; }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #ffffff, #93c5fd, #c4b5fd);
      -webkit-background-clip: text;
      color: transparent;
    }

    .desc { margin: 0; color: #cbd5e1; line-height: 1.45; font-size: 12px; }

    .panel { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
    .config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }

    label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 4px; }

    input, textarea {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px;
      padding: 10px;
      font-size: 16px;
      outline: none;
      background: rgba(15, 23, 42, 0.72);
      color: #f8fafc;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:not(:disabled):active { transform: scale(0.98); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .primary-btn {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      margin-top: 8px;
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.34);
    }

    .secondary-btn {
      width: 100%;
      background: rgba(30, 41, 59, 0.86);
      color: #bfdbfe;
      margin-top: 8px;
      border: 1px solid rgba(147, 197, 253, 0.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .settings-toggle {
      width: 100%;
      margin: 0;
      padding: 12px 14px;
      font-size: 15px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.34), rgba(124, 58, 237, 0.24));
      color: #e0f2fe;
      border: 1px solid rgba(147, 197, 253, 0.22);
    }

    .settings-content { display: none; margin-top: 10px; }
    .settings-content.open { display: block; }
    .settings-title { font-size: 15px; font-weight: 950; color: #e0f2fe; margin: 10px 0 6px; }

    .toggle-row { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 10px 0 8px; }
    .toggle-item {
      display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 14px;
      background: rgba(15, 23, 42, 0.58); border: 1px solid rgba(148, 163, 184, 0.20);
      font-size: 14px; cursor: pointer; user-select: none; color: #e5e7eb;
    }
    .toggle-item input { width: auto; transform: scale(1.2); }

    .current-turn {
      font-size: 20px;
      margin-bottom: 12px;
      color: #e0f2fe;
      font-weight: 950;
      letter-spacing: -0.2px;
      padding: 10px 12px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.26), rgba(124, 58, 237, 0.18));
      border: 1px solid rgba(96, 165, 250, 0.28);
    }

    .draw-result, .event-result {
      min-height: 92px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(30,41,59,0.92), rgba(30,64,175,0.22));
      border: 1px dashed rgba(147, 197, 253, 0.45);
      display: flex; align-items: center; justify-content: center; text-align: center;
      padding: 12px; line-height: 1.45; font-size: 17px; font-weight: 800; color: #e0f2fe;
    }

    .event-result { min-height: 120px; margin-top: 8px; }

    .dice-number {
      display: inline-block;
      font-size: clamp(70px, 20vw, 92px);
      line-height: 1;
      background: linear-gradient(135deg, #60a5fa, #c4b5fd);
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 950;
      margin-top: 4px;
    }

    .dice-unit { font-size: 34px; color: #93c5fd; font-weight: 900; margin-left: 4px; }
    .dice-rolling { animation: dicePulse 0.16s ease-in-out infinite alternate; }

    @keyframes dicePulse {
      from { transform: scale(0.92) rotate(-5deg); filter: blur(0px); }
      to { transform: scale(1.08) rotate(5deg); filter: blur(0.4px); }
    }

    .event-main-text {
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.3;
      background: linear-gradient(135deg, #60a5fa, #c4b5fd);
      -webkit-background-clip: text;
      color: transparent;
      font-weight: 950;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-height: 320px;
      overflow-y: auto;
      letter-spacing: -0.5px;
      padding-right: 4px;
    }

    .players-list { display: grid; grid-template-columns: 1fr; gap: 8px; }

    .player-item {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 10px; border-radius: 14px; background: rgba(30, 41, 59, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.20); font-size: 14px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .player-item.current {
      border-color: rgba(96, 165, 250, 0.95);
      box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.22), 0 12px 28px rgba(37, 99, 235, 0.28);
      transform: translateY(-1px);
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.42), rgba(124, 58, 237, 0.28));
    }

    .player-name { display: flex; align-items: center; gap: 8px; font-weight: 800; min-width: 0; flex-wrap: wrap; }
    .dot { width: 16px; height: 16px; border-radius: 50%; display: inline-block; border: 2px solid rgba(255,255,255,0.85); box-shadow: 0 0 10px rgba(255,255,255,0.18); flex: 0 0 auto; }

    .board-wrap { overflow-x: auto; margin-top: 10px; padding: 10px; -webkit-overflow-scrolling: touch; }
    .board-action { margin-bottom: 10px; }
    .board { display: grid; grid-template-columns: repeat(6, var(--cell-size)); gap: var(--cell-gap); width: max-content; min-width: auto; margin: 0 auto; }

    .cell {
      position: relative; width: var(--cell-size); min-height: var(--cell-size); border-radius: 12px;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
      border: 1px solid rgba(148, 163, 184, 0.22); padding: 4px; font-size: 10px; color: #94a3b8;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 4px 12px rgba(0, 0, 0, 0.18);
      cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      touch-action: manipulation; overflow: hidden;
    }

    .cell:hover { transform: translateY(-2px); border-color: rgba(147, 197, 253, 0.55); box-shadow: 0 10px 22px rgba(0, 0, 0, 0.28); }
    .cell.start { background: linear-gradient(135deg, rgba(22, 101, 52, 0.92), rgba(21, 128, 61, 0.78)); color: #dcfce7; font-weight: 800; }
    .cell.end { background: linear-gradient(135deg, rgba(153, 27, 27, 0.92), rgba(190, 24, 93, 0.76)); color: #fee2e2; font-weight: 800; }
    .cell.task { border-color: rgba(96, 165, 250, 0.70); }
    .cell.reward { border-color: rgba(74, 222, 128, 0.70); }
    .cell.penalty { border-color: rgba(248, 113, 113, 0.70); }
    .cell-type { margin-top: 2px; font-size: 10px; opacity: 0.90; }

    .pieces { position: absolute; bottom: 5px; left: 5px; right: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
    .piece { width: clamp(18px, 4.7vw, 24px); height: clamp(18px, 4.7vw, 24px); border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.42), 0 0 14px rgba(255,255,255,0.18); transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .piece.active { transform: scale(1.75); box-shadow: 0 0 0 5px rgba(96, 165, 250, 0.24), 0 6px 18px rgba(0, 0, 0, 0.55); z-index: 3; }

    .log-list { margin: 0; padding-left: 18px; max-height: 160px; overflow-y: auto; color: #cbd5e1; font-size: 13px; line-height: 1.6; }
    .section-space { margin-bottom: 14px; }
    .cell-hint { margin-top: 8px; padding: 9px 10px; border-radius: 14px; background: rgba(30,41,59,0.82); border: 1px solid rgba(147,197,253,0.18); color: #cbd5e1; font-size: 12px; line-height: 1.45; }
    .chain-note { display: inline-block; margin-top: 6px; padding: 3px 8px; border-radius: 999px; background: rgba(124,58,237,0.28); color: #ddd6fe; font-size: 12px; font-weight: 800; }

    .event-modal { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(2,6,23,0.72); backdrop-filter: blur(10px); }
    .event-modal.show { display: flex; }
    .event-card { width: min(92vw, 520px); min-height: clamp(260px, 46vh, 520px); max-height: 86vh; border-radius: 26px; padding: clamp(20px, 4vw, 28px); background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(30,41,59,0.98)); border: 2px solid rgba(147,197,253,0.30); box-shadow: 0 30px 80px rgba(0,0,0,0.50); animation: cardPop 0.24s ease-out; display: flex; flex-direction: column; justify-content: center; }
    .event-card.task { border-color: rgba(96,165,250,0.95); background: radial-gradient(circle at top left, rgba(37,99,235,0.36), transparent 42%), linear-gradient(180deg, rgba(15,23,42,0.98), rgba(30,41,59,0.98)); animation: cardPop 0.24s ease-out, taskPulse 1.6s ease-in-out infinite alternate; }
    .event-card.reward { border-color: rgba(74,222,128,0.95); background: radial-gradient(circle at top left, rgba(34,197,94,0.34), transparent 42%), linear-gradient(180deg, rgba(15,23,42,0.98), rgba(20,83,45,0.76)); animation: cardPop 0.24s ease-out, rewardGlow 1.35s ease-in-out infinite alternate; }
    .event-card.penalty { border-color: rgba(248,113,113,0.95); background: radial-gradient(circle at top left, rgba(239,68,68,0.34), transparent 42%), linear-gradient(180deg, rgba(15,23,42,0.98), rgba(127,29,29,0.76)); animation: cardPop 0.24s ease-out, penaltyShake 0.42s ease-in-out 1; }
    .event-card.ending { border-color: rgba(196,181,253,0.95); background: radial-gradient(circle at top left, rgba(168,85,247,0.38), transparent 42%), linear-gradient(180deg, rgba(15,23,42,0.98), rgba(59,7,100,0.76)); animation: cardPop 0.24s ease-out, endingGlow 1.5s ease-in-out infinite alternate; }

    @keyframes cardPop { from { transform: translateY(14px) scale(0.94); opacity: 0; } 70% { transform: translateY(-2px) scale(1.015); opacity: 1; } to { transform: translateY(0) scale(1); opacity: 1; } }
    @keyframes rewardGlow { from { box-shadow: 0 30px 80px rgba(0,0,0,0.50), 0 0 0 rgba(74,222,128,0); } to { box-shadow: 0 30px 80px rgba(0,0,0,0.50), 0 0 34px rgba(74,222,128,0.42); } }
    @keyframes taskPulse { from { box-shadow: 0 30px 80px rgba(0,0,0,0.50), 0 0 0 rgba(96,165,250,0); } to { box-shadow: 0 30px 80px rgba(0,0,0,0.50), 0 0 24px rgba(96,165,250,0.32); } }
    @keyframes endingGlow { from { box-shadow: 0 30px 80px rgba(0,0,0,0.50), 0 0 0 rgba(196,181,253,0); } to { box-shadow: 0 30px 80px rgba(0,0,0,0.50), 0 0 42px rgba(196,181,253,0.42); } }
    @keyframes penaltyShake { 0% { transform: translateX(0) scale(1); } 20% { transform: translateX(-6px) scale(1.01); } 40% { transform: translateX(6px) scale(1.01); } 60% { transform: translateX(-4px) scale(1.005); } 80% { transform: translateX(4px) scale(1.005); } 100% { transform: translateX(0) scale(1); } }

    .event-card-label { display: inline-block; padding: 5px 10px; border-radius: 999px; background: rgba(96,165,250,0.18); color: #bfdbfe; font-size: 13px; font-weight: 900; margin-bottom: 12px; }
    .event-card.reward .event-card-label { background: rgba(34,197,94,0.20); color: #bbf7d0; }
    .event-card.penalty .event-card-label { background: rgba(239,68,68,0.20); color: #fecaca; }
    .event-card.ending .event-card-label { background: rgba(168,85,247,0.22); color: #ddd6fe; }
    .event-card-title { font-size: clamp(28px, 8vw, 44px); line-height: 1.25; font-weight: 950; background: linear-gradient(135deg, #60a5fa, #c4b5fd); -webkit-background-clip: text; color: transparent; word-break: break-word; overflow-wrap: anywhere; max-height: 62vh; overflow-y: auto; margin-bottom: 16px; padding-right: 4px; white-space: pre-wrap; }
    .event-card-title.summary-title { font-size: clamp(18px, 4.8vw, 26px); line-height: 1.45; color: #e0f2fe; background: none; -webkit-background-clip: initial; white-space: pre-wrap; }
    .event-card-meta { color: #cbd5e1; font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
    .skip-card-btn { width: 100%; padding: 10px 14px; font-size: 13px; border-radius: 14px; margin-bottom: 8px; background: rgba(30,41,59,0.86); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.26); box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
    .skip-card-btn.hidden { display: none; }
    .modal-close-btn { width: 100%; background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; box-shadow: 0 10px 30px rgba(37,99,235,0.34); }

    .mobile-roll-bar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; display: block; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); background: linear-gradient(180deg, rgba(2,6,23,0), rgba(2,6,23,0.94) 28%, rgba(2,6,23,0.98)); backdrop-filter: blur(10px); }
    .mobile-roll-bar button { max-width: 520px; margin: 0 auto; display: block; }
    .mobile-turn-status, .mobile-dice-display { max-width: 520px; margin: 0 auto 8px; padding: 8px 10px; border-radius: 14px; background: rgba(15,23,42,0.82); border: 1px solid rgba(147,197,253,0.18); color: #dbeafe; font-size: 13px; font-weight: 850; text-align: center; }
    .mobile-dice-display { min-height: 76px; display: flex; align-items: center; justify-content: center; line-height: 1.35; }
    .mobile-dice-display .dice-number { font-size: 56px; }
    .mobile-dice-display .dice-unit { font-size: 24px; }

    @media (min-width: 760px) {
      .app { max-width: 980px; padding: 16px; padding-bottom: 24px; }
      .panel { grid-template-columns: 1.1fr 1fr; }
      .board-wrap { max-width: 800px; margin-left: auto; margin-right: auto; }
      .board { grid-template-columns: repeat(10, 70px); width: max-content; min-width: auto; }
      .cell { width: 70px; min-height: 70px; font-size: 10px; }
      .piece { width: 18px; height: 18px; }
      .mobile-roll-bar { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>FLY TO MOON</h1>
      <p class="desc">Creat for play with two grils. If you got sth and dont know how to do it as a man, let them do it together for you. 
    </div>

    <div class="panel">
      <div class="card-box">
        <div class="current-turn" id="currentTurn">当前回合：玩家1</div>
        <div class="draw-result" id="drawResult">点击“投骰子”开始游戏</div>
        <button class="primary-btn roll-btn" id="drawBtn">投骰子</button>
      </div>

      <div class="config-box">
        <button class="settings-toggle" id="settingsToggleBtn">打开设置</button>
        <div class="settings-content" id="settingsContent">
          <div class="config-row">
            <div>
              <label for="playerCountInput">玩家人数</label>
              <input id="playerCountInput" type="number" min="2" max="6" value="3" />
            </div>
            <div>
              <label for="boardSizeInput">格子数量</label>
              <input id="boardSizeInput" type="number" min="10" max="200" value="100" />
            </div>
          </div>
          <div class="settings-title">事件屏蔽</div>
          <div class="toggle-row">
            <label class="toggle-item"><input id="blockA" type="checkbox" />屏蔽针对sub的排泄play事件</label>
            <label class="toggle-item"><input id="blockB" type="checkbox" />屏蔽针对sub的女绿play事件</label>
            <label class="toggle-item"><input id="blockC" type="checkbox" />屏蔽露出事件</label>
            <label class="toggle-item"><input id="allowSkip" type="checkbox" />允许跳过</label>
          </div>
          <div class="settings-title">专属 sub 卡池</div>
          <div class="toggle-row">
            <label class="toggle-item"><input id="enableSubP2" type="checkbox" checked/>为玩家2开启 sub 卡池</label>
            <label class="toggle-item"><input id="enableSubP3" type="checkbox" />为玩家3开启 sub 卡池</label>
          </div>
          <button class="secondary-btn" id="resetBtn">重新开始</button>
          <button class="secondary-btn" id="applyConfigBtn">应用配置并重开</button>
          <button class="secondary-btn" id="loadSaveBtn">读取上次进度</button>
          <button class="secondary-btn" id="clearSaveBtn">清除保存</button>
          <div class="settings-title">事件内容导入（追加）</div>
          <textarea id="eventImportText" placeholder='粘贴JSON：{"task":{"1":["任务1"],"2":[],"3":[]},"taskSub":{"1":["sub任务1"],"2":[],"3":[]},"reward":{"1":[],"2":[],"3":[]},"penalty":{"1":[],"2":[],"3":[]},"ending":["结局1"]}'></textarea>
          <button class="secondary-btn" id="importEventsBtn">导入事件内容</button>
        </div>
      </div>
    </div>

    <div class="players-box section-space">
      <strong>玩家状态</strong>
      <div class="players-list" id="playersList" style="margin-top:10px;"></div>
    </div>

    <div class="event-box section-space">
      <strong>当前格子内容</strong>
      <div class="event-result" id="eventResult">尚未触发格子内容</div>
    </div>

    <div class="board-wrap">
      <div class="board-action">
        <button class="primary-btn roll-btn" id="boardDrawBtn">投骰子</button>
      </div>
      <div class="board" id="board"></div>
      <div class="cell-hint" id="cellHint">点击或悬停格子，可查看格子状态。</div>
    </div>

    <div class="log-box" style="margin-top:14px;">
      <strong>游戏记录</strong>
      <ol class="log-list" id="logList"></ol>
    </div>
  </div>

  <div class="event-modal" id="eventModal">
    <div class="event-card" id="eventCard">
      <div class="event-card-label" id="eventCardLabel">事件</div>
      <div class="event-card-title" id="eventCardTitle">事件内容</div>
      <div class="event-card-meta" id="eventCardMeta">事件说明</div>
      <button class="skip-card-btn" id="skipCardBtn">跳过</button>
      <button class="modal-close-btn" id="eventModalCloseBtn">确认</button>
    </div>
  </div>

  <div class="mobile-roll-bar">
    <div class="mobile-dice-display" id="mobileDiceDisplay">等待玩家投骰子</div>
    <div class="mobile-turn-status" id="mobileTurnStatus">当前玩家：玩家1｜下一位：玩家2</div>
    <button class="primary-btn roll-btn" id="mobileDrawBtn">投骰子</button>
  </div>

  <script>
    const SAVE_KEY = "draw-card-flight-chess-save-v3";
    const colors = ["#ef4444", "#3b82f6", "#22c55e", "#f59e0b", "#a855f7", "#14b8a6"];
    const diceFaces = [1, 2, 3, 4, 5, 6];
    const cellTypeText = { task: "任务", reward: "奖励", penalty: "惩罚", start: "起点", ending: "结局" };
    const config = { playerCount: 3, boardSize: 92, eventCountPerLevel: 0 };
//
//    const builtInEvents = {
//      task: { 1: [], 2: [], 3: [] },
//      // 任务 sub 卡池：只有开启 sub 的玩家2/玩家3有机会抽到。
//      // 写法同普通任务池：可以写字符串，也可以写 { text, isA, isB, isC }。
//      taskSub: { 1: [], 2: [], 3: [] },
//      reward: { 1: [], 2: [], 3: [] },
//      penalty: { 1: [], 2: [], 3: [] },
//      ending: []
//    };

    const builtInEvents = {
      task: {
        1: [
            { text:"请另一位女生在你胸上写上羞辱或赞美性的文字或者图案。如果你是玩家一，对玩家2/3这样做                  ",isA: false, isB: false, isC:false},

              }))
            : [];
          pools[type][level] = [...builtIns, ...placeholders, ...subItems];
        });
      });
      //["task", "reward", "penalty"].forEach(type => [2, 3].forEach(level => eventChains[type][level].forEach(chain => pools[type][level].push(chain.nodes[0]))));
      ["task"].forEach(type => [2, 3].forEach(level => eventChains[type][level].forEach(chain => pools[type][level].push(chain.nodes[0]))));
      return pools;
    }

    function createEndingGoldenPool(count) {
      const builtIns = (builtInEvents.ending || []).map((item, i) => normalizeEventItem(item, "ending", "ending", `builtin-ending-${i + 1}`));
      const placeholders = Array.from({ length: count }, (_, i) => ({ id: `ending-${i + 1}`, type: "ending", level: "ending", text: `结局占位符-${i + 1}`, isA: false, isB: false, isC: false, isChain: false, isSub: false }));
      return [...builtIns, ...placeholders];
    }

    function createRuntimePools() {
      const pools = { task: { 1: [], 2: [], 3: [] }, reward: { 1: [], 2: [], 3: [] }, penalty: { 1: [], 2: [], 3: [] } };
      ["task", "reward", "penalty"].forEach(type => [1, 2, 3].forEach(level => { pools[type][level] = shuffleCopy(goldenPools[type][level]); }));
      return pools;
    }

    function applyConfig() {
      config.playerCount = clamp(Number(document.getElementById("playerCountInput").value), 2, 6);
      config.boardSize = clamp(Number(document.getElementById("boardSizeInput").value), 10, 200);
      document.getElementById("playerCountInput").value = config.playerCount;
      document.getElementById("boardSizeInput").value = config.boardSize;
      initGame();
    }

    function initGame() {
      players = Array.from({ length: config.playerCount }, (_, i) => ({ name: `玩家${i + 1}`, position: 0, color: colors[i] }));
      playerStats = {};
      players.forEach(p => { playerStats[p.name] = { task: [], reward: [], penalty: [] }; });
      boardCells = createBoardCells(config.boardSize);
      visitedCells = new Set([0]);
      runtimePools = createRuntimePools();
      runtimeEndingPool = shuffleCopy(endingGoldenPool);
      activeChains = {};
      currentPlayerIndex = 0;
      gameOver = false;
      isMoving = false;
      activeMovingPlayerIndex = null;
      pendingAfterModal = null;
      currentCardContext = null;
      logCounter = 1;
      setRollButtons(false, "投骰子");
      drawResultEl.textContent = "点击“投骰子”开始游戏";
      eventResultEl.textContent = "尚未触发格子内容";
      mobileDiceDisplayEl.textContent = "等待玩家投骰子";
      cellHintEl.textContent = "点击或悬停格子，可查看格子状态。";
      logListEl.innerHTML = "";
      closeEventModal(false);
      addLog(`游戏开始：${config.playerCount} 名玩家，${config.boardSize} 格。`);
      renderAll();
      saveGameState();
    }

    function createBoardCells(size) {
      const usable = size - 1;
      const rewardCount = Math.round(usable * 0.1);
      const penaltyCount = Math.round(usable * 0.2);
      const taskCount = usable - rewardCount - penaltyCount;
      const types = shuffle([...Array(rewardCount).fill("reward"), ...Array(penaltyCount).fill("penalty"), ...Array(taskCount).fill("task")]);
      return Array.from({ length: size }, (_, i) => i === 0 ? { index: i, type: "start" } : { index: i, type: types[i - 1] });
    }

    async function rollDice() {
      if (gameOver || isMoving) return;
      isMoving = true;
      setRollButtons(true, "投掷中...");
      const player = players[currentPlayerIndex];
      const movingIndex = currentPlayerIndex;
      const roll = await playDiceAnimation(player);
      const oldPosition = player.position;
      const rawTarget = oldPosition + roll;
      const target = clamp(rawTarget, 0, config.boardSize - 1);
      const reachesEnding = rawTarget >= config.boardSize - 1;
      activeMovingPlayerIndex = movingIndex;
      setRollButtons(true, "移动中...");
      drawResultEl.innerHTML = `${player.name} 掷出：<br><span class="dice-number">${roll}</span><span class="dice-unit">点</span>`;
      mobileDiceDisplayEl.innerHTML = `${player.name} 掷出：<br><span class="dice-number">${roll}</span><span class="dice-unit">点</span>`;
      addLog(`${player.name} 掷出 ${roll} 点，开始从第 ${oldPosition + 1} 格前进。`);
      await animatePlayerMove(player, oldPosition, target);
      addLog(`${player.name} 移动到第 ${target + 1} 格。`);

      if (reachesEnding) {
        triggerEndingEvent(player);
        gameOver = true;
        drawResultEl.innerHTML = `🎉 ${player.name} 到达终点！`;
        addLog(`🎉 ${player.name} 到达或跨过终点，游戏结束。`);
        pendingAfterModal = () => {
          finishAction();
          saveGameState();
          showGameSummary();
        };
        return;
      }

      triggerCellEvent(player);
      pendingAfterModal = () => {
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        finishAction();
        saveGameState();
      };
    }

    function finishAction() {
      isMoving = false;
      activeMovingPlayerIndex = null;
      setRollButtons(gameOver, gameOver ? "游戏结束" : "投骰子");
      renderAll();
    }

    function setRollButtons(disabled, text) {
      rollButtons.forEach(btn => { btn.disabled = disabled; btn.textContent = text; });
    }

    function playDiceAnimation(player) {
      const start = Date.now();
      return new Promise(resolve => {
        const timer = setInterval(() => {
          const temp = diceFaces[Math.floor(Math.random() * diceFaces.length)];
          drawResultEl.innerHTML = `${player.name} 正在投掷<br><span class="dice-number dice-rolling">${temp}</span><span class="dice-unit">点</span>`;
          mobileDiceDisplayEl.innerHTML = `${player.name} 正在投掷<br><span class="dice-number dice-rolling">${temp}</span><span class="dice-unit">点</span>`;
          if (Date.now() - start >= 1000) {
            clearInterval(timer);
            resolve(diceFaces[Math.floor(Math.random() * diceFaces.length)]);
          }
        }, 90);
      });
    }

    async function animatePlayerMove(player, start, target) {
      for (let pos = start + 1; pos <= target; pos++) {
        player.position = pos;
        visitedCells.add(pos);
        renderAll();
        await sleep(520);
      }
    }

    function triggerCellEvent(player) {
      visitedCells.add(player.position);
      const cell = boardCells[player.position];
      if (cell.type === "start") return;
      const level = getPoolLevel(player.position);

      // 特殊规则：玩家1免疫惩罚。玩家1踩到惩罚格时，改为抽任务卡。
      const actualType = (player.name === "玩家1" && cell.type === "penalty") ? "task" : cell.type;
      const event = drawEventOrChain(player, actualType, level);
      presentDrawnEvent({ player, cellType: cell.type, actualType, level, event });
    }

    function presentDrawnEvent({ player, cellType, actualType, level, event }) {
      if (playerStats[player.name]?.[actualType]) playerStats[player.name][actualType].push(event.text);

      currentCardContext = { player, cellType, actualType, level, event };

      const chainHtml = event.isChain ? `<br><span class="chain-note">事件链 ${event.nodeIndex + 1}/${getChainLengthByEvent(event)}</span>` : "";
      eventResultEl.innerHTML = `<div class="event-main-text">${event.text}${chainHtml}</div>`;
      showEventModal({
        type: actualType,
        label: event.isSub ? `${cellTypeText[actualType]} sub卡` : `${cellTypeText[actualType]}卡`,
        title: event.text,
        meta: actualType !== cellType
          ? `${player.name} 免疫惩罚，改为触发任务事件`
          : (event.isSub ? `${player.name} 触发专属 sub 事件` : (event.isChain ? `事件链节点 ${event.nodeIndex + 1}/${getChainLengthByEvent(event)}` : `${player.name} 触发事件`)),
        skippable: isCurrentCardSkippable(event)
      });
      addLog(`${player.name} 触发「${event.isSub ? "sub" : ""}${cellTypeText[actualType]}」：${event.text}。当前为 ${level}级池。${actualType !== cellType ? "（免疫惩罚，转为任务）" : ""}`);
    }

    function triggerEndingEvent(player) {
      visitedCells.add(config.boardSize - 1);
      const event = drawEndingEvent();
      eventResultEl.innerHTML = `<div class="event-main-text">${event.text}</div>`;
      showEventModal({ type: "ending", label: "结局事件", title: event.text, meta: `${player.name} 到达或跨过终点` });
      addLog(`${player.name} 触发「结局」：${event.text}。`);
    }

    function drawEventOrChain(player, type, level) {
      const key = `${player.name}-${type}`;
      if (activeChains[key]) {
        const state = activeChains[key];
        let node = state.chain.nodes[state.nextNodeIndex];
        while (node && !isEventAllowed(node, player)) { state.nextNodeIndex++; node = state.chain.nodes[state.nextNodeIndex]; }
        if (!node) { delete activeChains[key]; return drawEventFromPool(type, level, player); }
        state.nextNodeIndex++;
        if (state.nextNodeIndex >= state.chain.nodes.length) delete activeChains[key];
        return node;
      }
      const event = drawEventFromPool(type, level, player);
      if (event.isChain && event.nodeIndex === 0) {
        const chain = findChainById(event.chainId);
        if (chain) activeChains[key] = { chain, nextNodeIndex: 1 };
      }
      return event;
    }

    function drawEventFromPool(type, level, player) { return drawFilteredEvent(runtimePools[type][level], goldenPools[type][level], player); }
    //function drawEndingEvent() { return drawFilteredEvent(runtimeEndingPool, endingGoldenPool, null); }
    function drawEndingEvent() {
      const pool = endingGoldenPool.filter(event => event && event.text && !event.text.includes("结局占位符"));
    
      if (pool.length === 0) {
        return {
          id: "ending-fallback",
          type: "ending",
          level: "ending",
          text: "恭喜到达终点！请玩家2/3以六九的姿势相互为对方寸止一次，然后享受乱交吧~",
          isA: false,
          isB: false,
          isC: false,
          isChain: false,
          isSub: false
        };
      }

      return pool[Math.floor(Math.random() * pool.length)];
    }

    function drawFilteredEvent(runtimePool, goldenPool, player) {
      const index = runtimePool.findIndex(event => isEventAllowed(event, player));
      if (index !== -1) return runtimePool.splice(index, 1)[0];
      const available = goldenPool.filter(event => isEventAllowed(event, player));
      if (available.length > 0) { runtimePool.splice(0, runtimePool.length, ...shuffleCopy(available)); return runtimePool.shift(); }
      if (runtimePool.length > 0) return runtimePool.shift();
      runtimePool.splice(0, runtimePool.length, ...shuffleCopy(goldenPool));
      return runtimePool.shift();
    }

    function isEventAllowed(event, player = null) {
      if (event.isSub && !isSubEnabledForPlayer(player)) return false;
      if (document.getElementById("blockA").checked && event.isA) return false;
      if (document.getElementById("blockB").checked && event.isB) return false;
      if (document.getElementById("blockC").checked && event.isC) return false;
      return true;
    }

    function isSubEnabledForPlayer(player) {
      if (!player) return false;
      if (player.name === "玩家2") return document.getElementById("enableSubP2").checked;
      if (player.name === "玩家3") return document.getElementById("enableSubP3").checked;
      return false;
    }

    function getPoolLevel(position) {
      const progress = position / (config.boardSize - 1);
      if (progress >= 2 / 3) return 3;
      if (progress >= 1 / 3) return 2;
      return 1;
    }

    function getChainLengthByEvent(event) {
      const chain = findChainById(event.chainId);
      return chain ? chain.nodes.length : 1;
    }

    function findChainById(chainId) {
      for (const type of ["task", "reward", "penalty"]) {
        for (const level of [2, 3]) {
          const found = eventChains[type][level].find(chain => chain.id === chainId);
          if (found) return found;
        }
      }
      return null;
    }

    function showEventModal({ type, label, title, meta, skippable = false }) {
      eventCardEl.className = `event-card ${type}`;
      eventCardLabelEl.textContent = label;
      eventCardTitleEl.classList.remove("summary-title");
      eventCardTitleEl.textContent = title;
      eventCardMetaEl.textContent = meta;
      skipCardBtn.classList.toggle("hidden", !skippable);
      eventModalEl.classList.add("show");
    }

    function closeEventModal(runPending = true) {
      eventModalEl.classList.remove("show");
      skipCardBtn.classList.add("hidden");
      if (runPending && pendingAfterModal) {
        const callback = pendingAfterModal;
        pendingAfterModal = null;
        callback();
      }
    }

    function isCurrentCardSkippable(event) {
      if (!document.getElementById("allowSkip").checked) return false;
      if (!event) return false;
      if (event.type === "ending") return false;
      // 事件链的非头部节点不允许跳过；普通卡和事件链头节点允许跳过。
      if (event.isChain && event.nodeIndex > 0) return false;
      return true;
    }

    function skipCurrentCard(event) {
      event.stopPropagation();
      if (!currentCardContext || !isCurrentCardSkippable(currentCardContext.event)) return;

      const { player, cellType, actualType, level, event: skippedEvent } = currentCardContext;

      // 若跳过的是事件链头节点，取消刚刚挂上的事件链，避免后续强制进入链。
      if (skippedEvent.isChain && skippedEvent.nodeIndex === 0) {
        delete activeChains[`${player.name}-${actualType}`];
      }

      // 统计中移除被跳过的当前卡；卡本身已经从运行池消耗掉，不放回。
      const statList = playerStats[player.name]?.[actualType];
      if (statList && statList[statList.length - 1] === skippedEvent.text) {
        statList.pop();
      }

      addLog(`${player.name} 跳过了「${skippedEvent.text}」，重新抽取。`);
      const nextEvent = drawEventOrChain(player, actualType, level);
      presentDrawnEvent({ player, cellType, actualType, level, event: nextEvent });
      saveGameState();
    }

    function showGameSummary() {
      let bestPlayers = [];
      let maxReward = -1;
      let summary = "";

      players.forEach(player => {
        const stats = playerStats[player.name] || { task: [], reward: [], penalty: [] };
        summary += `【${player.name}】
`;
        summary += `奖励(${stats.reward.length})：${stats.reward.join("、") || "无"}
`;
        summary += `任务(${stats.task.length})：${stats.task.join("、") || "无"}
`;
        summary += `惩罚(${stats.penalty.length})：${stats.penalty.join("、") || "无"}

`;

        if (stats.reward.length > maxReward) {
          maxReward = stats.reward.length;
          bestPlayers = [player.name];
        } else if (stats.reward.length === maxReward) {
          bestPlayers.push(player.name);
        }
      });

      summary += `🏆 最佳小馋猫：${bestPlayers.join("、")}
奖励最多：${maxReward}次`;

      eventCardEl.className = "event-card ending";
      eventCardLabelEl.textContent = "游戏总结";
      eventCardTitleEl.classList.add("summary-title");
      eventCardTitleEl.textContent = summary;
      eventCardMetaEl.textContent = "本轮游戏已结束";
      eventModalEl.classList.add("show");
    }

    function renderAll() { renderBoard(); renderPlayers(); renderCurrentTurn(); }

    function renderCurrentTurn() {
      currentTurnEl.textContent = gameOver ? "游戏结束" : `当前回合：${players[currentPlayerIndex].name}`;
      if (!gameOver && players.length > 0) {
        mobileTurnStatusEl.textContent = `当前玩家：${players[currentPlayerIndex].name}｜下一位：${players[(currentPlayerIndex + 1) % players.length].name}`;
      } else {
        mobileTurnStatusEl.textContent = "游戏结束";
      }
    }

    function renderPlayers() {
      playersListEl.innerHTML = "";
      players.forEach((player, index) => {
        const item = document.createElement("div");
        item.className = `player-item ${index === currentPlayerIndex && !gameOver ? "current" : ""}`;
        item.innerHTML = `<div class="player-name"><span class="dot" style="background:${player.color}"></span>${player.name}${index === currentPlayerIndex && !gameOver ? "（当前）" : ""}${getActiveChainText(player)}</div><div>第 ${player.position + 1} / ${config.boardSize} 格</div>`;
        playersListEl.appendChild(item);
      });
    }

    function getActiveChainText(player) {
      return Object.entries(activeChains)
        .filter(([key]) => key.startsWith(`${player.name}-`))
        .map(([, state]) => `｜链${state.nextNodeIndex + 1}/${state.chain.nodes.length}`)
        .join("");
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      boardEl.style.gridTemplateColumns = window.innerWidth < 760 ? "repeat(6, var(--cell-size))" : "repeat(10, 70px)";
      for (let i = 0; i < config.boardSize; i++) {
        const boardCell = boardCells[i];
        const isVisited = visitedCells.has(i);
        const cell = document.createElement("div");
        cell.className = isVisited ? `cell ${boardCell.type}` : "cell";
        if (boardCell.type === "start") cell.classList.add("start");
        if (i === config.boardSize - 1) cell.classList.add("end");
        const label = i === 0 ? "起点" : i === config.boardSize - 1 ? "终点" : i + 1;
        const typeName = boardCell.type === "start" ? "起点" : (isVisited ? cellTypeText[boardCell.type] : "？");
        cell.innerHTML = `<div>${label}</div><div class="cell-type">${typeName}</div><div class="pieces"></div>`;
        cell.title = getCellHintText(i, boardCell, isVisited);
        cell.addEventListener("mouseenter", () => showCellHint(i, boardCell, isVisited));
        cell.addEventListener("click", () => showCellHint(i, boardCell, isVisited));
        const piecesEl = cell.querySelector(".pieces");
        players.filter(player => player.position === i).forEach(player => {
          const piece = document.createElement("div");
          piece.className = "piece";
          piece.style.background = player.color;
          if (players.indexOf(player) === activeMovingPlayerIndex) piece.classList.add("active");
          piecesEl.appendChild(piece);
        });
        boardEl.appendChild(cell);
      }
    }

    function showCellHint(index, boardCell, isVisited) { cellHintEl.textContent = getCellHintText(index, boardCell, isVisited); }
    function getCellHintText(index, boardCell, isVisited) {
      const label = index === 0 ? "起点" : index === config.boardSize - 1 ? "终点" : `第 ${index + 1} 格`;
      const playersHere = players.filter(player => player.position === index).map(player => player.name).join("、") || "无玩家";
      if (boardCell.type === "start") return `${label}｜起点格｜不触发事件｜当前位置：${playersHere}`;
      if (!isVisited) return `${label}｜尚未揭示｜当前位置：${playersHere}`;
      const level = getPoolLevel(index);
      const chainInfo = level === 1 ? "无事件链" : `${level}级事件链可能触发`;
      return `${label}｜${cellTypeText[boardCell.type]}格｜${level}级池｜${chainInfo}｜当前位置：${playersHere}`;
    }

    function addLog(text) {
      const li = document.createElement("li");
      li.textContent = `${logCounter++}. ${text}`;
      logListEl.appendChild(li);
      logListEl.scrollTop = logListEl.scrollHeight;
    }

    function saveGameState() {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          config: { ...config },
          settings: {
            enableSubP2: document.getElementById("enableSubP2").checked,
            enableSubP3: document.getElementById("enableSubP3").checked,
            allowSkip: document.getElementById("allowSkip").checked
          },
          players, boardCells, visitedCells: Array.from(visitedCells), currentPlayerIndex, gameOver,
          runtimePools, runtimeEndingPool, activeChains, playerStats, logCounter,
          logs: Array.from(logListEl.children).map(li => li.textContent),
          drawResultHtml: drawResultEl.innerHTML,
          eventResultHtml: eventResultEl.innerHTML,
          mobileDiceDisplayHtml: mobileDiceDisplayEl.innerHTML
        }));
      } catch (error) { console.warn("保存失败", error); }
    }

    function loadGameState() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return alert("没有找到上次保存的进度");
      try {
        const data = JSON.parse(raw);
        Object.assign(config, data.config || {});
        players = data.players || [];
        boardCells = data.boardCells || [];
        visitedCells = new Set(data.visitedCells || [0]);
        currentPlayerIndex = data.currentPlayerIndex || 0;
        gameOver = Boolean(data.gameOver);
        runtimePools = data.runtimePools || createRuntimePools();
        runtimeEndingPool = data.runtimeEndingPool || shuffleCopy(endingGoldenPool);
        activeChains = data.activeChains || {};
        playerStats = data.playerStats || {};
        logCounter = data.logCounter || 1;
        pendingAfterModal = null;
        isMoving = false;
        activeMovingPlayerIndex = null;
        document.getElementById("playerCountInput").value = config.playerCount;
        document.getElementById("boardSizeInput").value = config.boardSize;
        document.getElementById("enableSubP2").checked = Boolean(data.settings?.enableSubP2);
        document.getElementById("enableSubP3").checked = Boolean(data.settings?.enableSubP3);
        document.getElementById("allowSkip").checked = Boolean(data.settings?.allowSkip);
        drawResultEl.innerHTML = data.drawResultHtml || "点击“投骰子”开始游戏";
        eventResultEl.innerHTML = data.eventResultHtml || "尚未触发格子内容";
        mobileDiceDisplayEl.innerHTML = data.mobileDiceDisplayHtml || "等待玩家投骰子";
        logListEl.innerHTML = "";
        (data.logs || []).forEach(text => { const li = document.createElement("li"); li.textContent = text; logListEl.appendChild(li); });
        closeEventModal(false);
        setRollButtons(gameOver, gameOver ? "游戏结束" : "投骰子");
        renderAll();
      } catch (error) { alert("读取失败：保存数据可能损坏"); console.error(error); }
    }

    function clearSavedGame() { localStorage.removeItem(SAVE_KEY); alert("已清除保存进度"); }

    function importEventsFromJson() {
      const raw = document.getElementById("eventImportText").value.trim();
      if (!raw) return alert("请先粘贴事件JSON");
      try {
        const data = JSON.parse(raw);
        appendImportedEvents(data);
        runtimePools = createRuntimePools();
        runtimeEndingPool = shuffleCopy(endingGoldenPool);
        activeChains = {};
        saveGameState();
        alert("事件内容已作为额外事件追加。当前牌池已重洗。源文件内置事件仍然保留。 ");
      } catch (error) { alert("导入失败：JSON格式不正确"); console.error(error); }
    }

    function appendImportedEvents(data) {
      ["task", "reward", "penalty"].forEach(type => {
        [1, 2, 3].forEach(level => {
          const list = data?.[type]?.[String(level)] || data?.[type]?.[level];
          if (!Array.isArray(list)) return;
          list.forEach((item, i) => goldenPools[type][level].push(normalizeEventItem(item, type, level, `import-${Date.now()}-${type}-${level}-${i}`)));
        });
      });

      [1, 2, 3].forEach(level => {
        const list = data?.taskSub?.[String(level)] || data?.taskSub?.[level];
        if (!Array.isArray(list)) return;
        list.forEach((item, i) => {
          goldenPools.task[level].push({
            ...normalizeEventItem(item, "task", level, `import-${Date.now()}-taskSub-${level}-${i}`),
            isSub: true
          });
        });
      });
      if (Array.isArray(data.ending)) data.ending.forEach((item, i) => endingGoldenPool.push(normalizeEventItem(item, "ending", "ending", `import-${Date.now()}-ending-${i}`)));
    }

    function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; }
    function shuffleCopy(array) { return shuffle([...array]); }
    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    initGame();
  </script>
</body>
</html>
